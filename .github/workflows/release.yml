name: release
# Publish to npm with provenance AND create a GitHub Release on a version tag.
# No npm tokens — OIDC trusted publishing.
# One-time on npmjs.com: package -> Settings -> Trusted Publishing -> add publisher
#   owner: alexxanderdiaz · repo: ai-coding-stack · workflow: release.yml
# Release with:  npm version patch && git push --follow-tags
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC: npm verifies the build came from this workflow

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Smoke tests
        run: node test/smoke.js
      - name: Publish to npm (provenance, no token)
        run: npm publish --provenance --access public
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag || true
